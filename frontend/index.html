<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="基于大语言模型的专利技术匹配系统 - 实体和领域增强的语义匹配" />
    <title>PatentMatch - 专利技术匹配系统</title>
    
    <!-- 学术字体预连接 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- 学术字体组合: Crimson Pro (标题) + Atkinson Hyperlegible (正文) -->
    <link 
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" 
      rel="stylesheet" 
    />
    
    <style>
      /* 首屏加载样式优化 */
      #app {
        min-height: 100vh;
      }
      
      /* 加载占位 */
      .app-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #F8FAFC;
        font-family: 'Atkinson Hyperlegible', 'PingFang SC', sans-serif;
      }
      
      .app-loading-title {
        font-family: 'Crimson Pro', 'Noto Serif SC', serif;
        font-size: 28px;
        font-weight: 600;
        color: #0F172A;
        margin-bottom: 12px;
        letter-spacing: -0.02em;
      }
      
      .app-loading-subtitle {
        font-size: 14px;
        color: #64748B;
        margin-bottom: 32px;
      }
      
      .app-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #E2E8F0;
        border-top-color: #1D4ED8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- 首屏加载占位 -->
      <div class="app-loading">
        <div class="app-loading-title">PatentMatch</div>
        <div class="app-loading-subtitle">专利技术匹配系统</div>
        <div class="app-loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
