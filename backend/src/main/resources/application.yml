server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: patent-match-system

  # 多环境配置
  profiles:
    active: dev

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # MySQL配置
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/patent_match_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:280054}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: PatentHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

    # Elasticsearch配置
    elasticsearch:
      uris: ${ES_URIS:http://192.168.65.131:9200}

    # MongoDB配置（聊天历史存储）
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/patent_chat}

  # Neo4j 知识图谱配置
  neo4j:
    uri: ${NEO4J_URI:bolt://192.168.65.131:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:neo4j280054}
    connection-timeout: 30s
    max-transaction-retry-time: 15s

  # Spring AI配置
  ai:
    # ── 在线模式（OpenAI 兼容 API）──────────────────────────────────────────
    # 支持：通义千问 / DeepSeek / OpenAI / 字节豆包 / 智谱GLM / 硅基流动等
    openai:
      # 系统预设 BaseURL，支持环境变量覆盖
      # 通义千问: https://dashscope.aliyuncs.com/compatible-mode
      # DeepSeek:  https://api.deepseek.com
      # OpenAI:    https://api.openai.com
      base-url: ${ONLINE_API_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${ONLINE_API_KEY:${DASH_SCOPE_API_KEY:placeholder}}
      connect-timeout: 60s
      read-timeout: 120s
      chat:
        options:
          # 默认对话模型（会被 LlmConfig 中的 Bean 覆盖）
          model: ${ONLINE_CHAT_MODEL:qwen-plus}
          temperature: 0.7
      embedding:
        options:
          # 在线 Embedding 模型，1024维
          model: ${ONLINE_EMBED_MODEL:text-embedding-v3}

    # ── 离线模式（Ollama 本地）──────────────────────────────────────────────
    # 三模型分工：chatModel(对话) / llmModel(分析) / embedModel(向量)
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          # 默认模型（会被 LlmConfig 中的 Bean 覆盖为对应分工模型）
          model: ${OLLAMA_CHAT_MODEL:deepseek-r1:7b}
          temperature: 0.7
      embedding:
        options:
          # bge-m3: 1024维，与在线 text-embedding-v3 维度一致，切换无需重建向量库
          model: ${OLLAMA_EMBED_MODEL:bge-m3}

    # Qdrant向量存储
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:192.168.65.131}
        port: ${QDRANT_PORT:6334}
        api-key: ${QDRANT_API_KEY:}
        collection-name: patent
        initialize-schema: true

    # 重试配置
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 1000
        multiplier: 2
        max-interval: 10000

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.patent.model.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Sa-Token配置
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true

# MinIO配置
minio:
  endpoint: ${MINIO_ENDPOINT:192.168.65.131:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:admin280054}
  bucket-name: ${MINIO_BUCKET:patent-files}

# ── 专利系统核心配置 ───────────────────────────────────────────────────────
patent:
  # API Key 加密密钥（AES-256，32字节，生产环境必须通过环境变量覆盖）
  api-key-secret: ${API_KEY_SECRET:PatentSys@AES256Key!ChangeMe!!}

  # LLM模式: online-在线API / offline-Ollama本地
  # 默认 offline，无网环境安全启动；online 模式需设置 ONLINE_API_KEY 环境变量
  llm-mode: ${LLM_MODE:offline}

  # 匹配结果数量
  match-top-k: 10

  # 相似度阈值（向量检索最低分）
  similarity-threshold: 0.6

  # 向量维度 - 统一使用 1024 维
  # bge-m3(离线) 和 text-embedding-v3(在线) 均为 1024 维，切换无需重建向量库
  vector-dimension: ${VECTOR_DIMENSION:1024}

  # ── 离线模式（Ollama）三模型配置 ──────────────────────────────────────────
  ollama:
    # 对话模型 - ChatService 使用，强推理/上下文理解
    chat-model: ${OLLAMA_CHAT_MODEL:deepseek-r1:7b}
    # 分析模型 - LlmService 使用，实体提取/匹配评估，中文理解佳
    llm-model: ${OLLAMA_LLM_MODEL:qwen2.5:7b}
    # 向量模型 - VectorService 使用，1024维与在线模式兼容
    embed-model: ${OLLAMA_EMBED_MODEL:bge-m3}

  # ── 在线模式（OpenAI 兼容 API）三模型配置 ────────────────────────────────
  online:
    # 系统级 API 配置（环境变量覆盖）
    base-url: ${ONLINE_API_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
    api-key: ${ONLINE_API_KEY:}
    # 对话模型 - ChatService 使用
    chat-model: ${ONLINE_CHAT_MODEL:qwen-max}
    # 分析模型 - LlmService 使用
    llm-model: ${ONLINE_LLM_MODEL:qwen-plus}
    # 向量模型 - VectorService 使用，1024维
    embed-model: ${ONLINE_EMBED_MODEL:text-embedding-v3}

# Knife4j API文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: '专利匹配系统API'
      paths-to-match: '/**'
      packages-to-scan: com.patent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表

# 日志配置
logging:
  level:
    root: INFO
    com.patent: DEBUG
    org.springframework.ai: DEBUG
    # 屏蔽 Spring Data Neo4j 使用 id() 函数的废弃警告（SDN 7.x 已知问题，不影响功能）
    org.springframework.data.neo4j.cypher.deprecation: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
