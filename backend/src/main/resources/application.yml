server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: patent-match-system

  # 多环境配置
  profiles:
    active: dev

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # MySQL配置
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/patent_match_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:280054}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: PatentHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

    # Elasticsearch配置
    elasticsearch:
      uris: ${ES_URIS:http://192.168.65.131:9200}

    # MongoDB配置（聊天历史存储）
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/patent_chat}

  # Neo4j 知识图谱配置
  neo4j:
    uri: ${NEO4J_URI:bolt://192.168.65.131:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:neo4j280054}
    connection-timeout: 30s
    max-transaction-retry-time: 15s

  # Spring AI配置
  ai:
    # ── OpenAI 兼容接口（在线 Embedding 专用）──────────────────────────────
    # 对话/分析模型均从数据库激活配置动态构建，此处仅供 OpenAiEmbeddingModel 自动装配使用
    openai:
      base-url: ${ONLINE_API_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${ONLINE_API_KEY:${DASH_SCOPE_API_KEY:placeholder}}
      connect-timeout: 60s
      read-timeout: 120s
      chat:
        options:
          # 占位符，防止 Spring AI 自动装配报错（实际对话模型由 DynamicLlmFactory 从 DB 动态构建）
          model: placeholder
      embedding:
        options:
          # 向量嵌入模型（固定），切换模型需重建 Qdrant 向量库
          model: ${ONLINE_EMBED_MODEL:text-embedding-v3}
          # 向量维度（与 Qdrant Collection 强绑定）
          dimensions: ${VECTOR_DIMENSION:1024}

    # ── Ollama（离线对话模型专用）───────────────────────────────────────────
    # 对话/分析模型从数据库激活配置动态构建，此处 base-url 仅供 Spring AI 自动装配占位
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          # 占位符，防止 Spring AI 自动装配报错（实际对话模型由 DynamicLlmFactory 从 DB 动态构建）
          model: placeholder

    # Qdrant向量存储
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:192.168.65.131}
        port: ${QDRANT_PORT:6334}
        api-key: ${QDRANT_API_KEY:}
        collection-name: patent
        initialize-schema: true

    # 重试配置
    # Connection reset 属于网络瞬时故障（TransientAiException），Spring AI 会自动重试
    # 调大 initial-interval 和 max-interval，给服务端足够恢复时间
    retry:
      max-attempts: 5
      backoff:
        initial-interval: 2000    # 首次重试等待 2s
        multiplier: 2             # 指数退避：2s → 4s → 8s → 16s
        max-interval: 30000       # 最长等待 30s，防止无限等待
      on-client-errors: false     # 4xx 不重试（参数错误重试无意义）

# MinIO配置
minio:
  endpoint: ${MINIO_ENDPOINT:192.168.65.131:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:admin280054}
  bucket-name: ${MINIO_BUCKET:patent-files}
  
# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.patent.model.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Sa-Token配置
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true

# ── 专利系统核心配置 ───────────────────────────────────────────────────────
patent:
  # API Key 加密密钥（AES-256，32字节，生产环境必须通过环境变量覆盖）
  api-key-secret: ${API_KEY_SECRET:PatentSys@AES256Key!ChangeMe!!}

  # LLM模式: online-在线API / offline-Ollama本地（用于系统状态展示，实际LLM配置从数据库读取）
  llm-mode: ${LLM_MODE:offline}

  # 匹配结果数量
  match-top-k: 10

  # 相似度阈值（向量检索最低分）
  similarity-threshold: 0.6

# Knife4j API文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: '专利匹配系统API'
      paths-to-match: '/**'
      packages-to-scan: com.patent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表

# 日志配置
logging:
  level:
    root: INFO
    com.patent: DEBUG
    org.springframework.ai: DEBUG
    # 屏蔽 Spring Data Neo4j 使用 id() 函数的废弃警告（SDN 7.x 已知问题，不影响功能）
    org.springframework.data.neo4j.cypher.deprecation: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
