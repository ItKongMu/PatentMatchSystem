# Docker环境配置
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/patent_match_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:280054}

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:}
    elasticsearch:
      uris: http://elasticsearch:9200

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
    ollama:
      base-url: http://ollama:11434
    vectorstore:
      qdrant:
        host: qdrant
        port: 6334

minio:
  endpoint: http://minio:9000
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:admin280054}
  bucket-name: patent-files

patent:
  llm-mode: ${LLM_MODE:online}

# 生产环境关闭SQL日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    com.patent: INFO
    org.springframework.ai: INFO
