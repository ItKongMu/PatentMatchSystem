# Docker 环境配置（容器间通过服务名通信）
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/patent_match_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:123}

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:}
    elasticsearch:
      uris: http://elasticsearch:9200
    mongodb:
      uri: ${MONGODB_URI:mongodb://root:280054@mongodb:27017/patent_chat?authSource=admin}

  neo4j:
    uri: ${NEO4J_URI:bolt://neo4j:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:neo4j280054}

  ai:
    openai:
      base-url: ${ONLINE_API_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${ONLINE_API_KEY:${DASH_SCOPE_API_KEY:placeholder}}
      connect-timeout: 60s
      read-timeout: 120s
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:qdrant}
        port: ${QDRANT_PORT:6334}
        api-key: ${QDRANT_API_KEY:otqozwqtj4abdu6hsvtgjghw4h2qyoxu}

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:admin280054}
  bucket-name: ${MINIO_BUCKET:patent-files}

patent:
  llm-mode: ${LLM_MODE:online}

# 生产环境关闭SQL日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    com.patent: INFO
    org.springframework.ai: INFO
